<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<title>Key Browser</title>
<style>
  :root[data-theme="light"] {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-2: #f0f0f0;
    --surface-3: #eaeaea;
    --border: #d8d8d8;
    --border-subtle: #ececec;
    --text: #222;
    --text-muted: #888;
    --text-faint: #aaa;
    --accent-bg: #dbeafe;
    --accent-bg-hover: #bfd8f5;
    --hover: #f5f9ff;
    --error: #c00;
    --json-key: #0550ae;
    --json-string: #a31515;
    --json-number: #098658;
    --json-boolean: #0000ff;
    --json-null: #0000ff;
    --json-punct: #444;
    --json-toggle: #888;
  }
  :root[data-theme="dark"] {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface-2: #2d2d2d;
    --surface-3: #333;
    --border: #3a3a3a;
    --border-subtle: #2e2e2e;
    --text: #e4e4e4;
    --text-muted: #999;
    --text-faint: #666;
    --accent-bg: #1e3a5f;
    --accent-bg-hover: #274b78;
    --hover: #2a2f38;
    --error: #f48771;
    --json-key: #9cdcfe;
    --json-string: #ce9178;
    --json-number: #b5cea8;
    --json-boolean: #569cd6;
    --json-null: #569cd6;
    --json-punct: #d4d4d4;
    --json-toggle: #858585;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
  }

  .app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toolbar-title { font-weight: 600; font-size: 13px; }
  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .theme-toggle:hover { background: var(--surface-3); }

  .columns { display: flex; flex: 1; overflow: hidden; }
  .col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .col:last-child { border-right: none; }
  .col-tree  { width: 25%; }
  .col-keys { width: 25%; }
  .col-json  { width: 50%; }

  .col-header {
    padding: 6px 10px 6px 14px;
    font-weight: 600;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-height: 36px;
  }
  .col-body { flex: 1; overflow-y: auto; overflow-x: auto; }

  /* Icons */
  .icon {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0; vertical-align: middle;
  }
  .icon-folder  { color: #e8a33d; }
  .icon-key    { color: var(--text-muted); }
  .icon-chevron { color: var(--text-muted); width: 12px; height: 12px; transition: transform .12s ease; }
  .tree-node.expanded > .tree-row .icon-chevron { transform: rotate(90deg); }

  /* Header button */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px; font-size: 11px; font-weight: 600;
    background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); cursor: pointer;
    text-transform: none; letter-spacing: 0; font-family: inherit;
  }
  .btn:hover:not(:disabled) { background: var(--hover); border-color: var(--text-faint); }
  .btn:active:not(:disabled) { background: var(--surface-3); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn .icon { width: 13px; height: 13px; }
  .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; border-color: #1d4ed8; }
  .btn-danger { color: #b91c1c; }
  .btn-danger:hover:not(:disabled) { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
  :root[data-theme="dark"] .btn-danger { color: #f87171; }
  :root[data-theme="dark"] .btn-danger:hover:not(:disabled) { background: #3a1d1d; border-color: #7f1d1d; color: #fca5a5; }
  .header-actions { display: flex; gap: 6px; align-items: center; }
  .btn-icon-only { padding: 4px 6px; }

  /* Metadata panel (expander under Details header) */
  #btn-toggle-meta .icon-chevron { transition: transform .15s ease; }
  .meta-panel {
    max-height: 0;
    overflow: hidden;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    transition: max-height .2s ease;
    flex-shrink: 0;
  }
  .meta-panel.open { max-height: 300px; overflow-y: auto; }
  .meta-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 14px;
    padding: 10px 14px;
    font-size: 12px;
    align-items: baseline;
  }
  .meta-label {
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .4px;
    font-weight: 600;
    white-space: nowrap;
  }
  .meta-value {
    color: var(--text);
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 11.5px;
    word-break: break-all;
  }
  .meta-value.muted { color: var(--text-faint); font-style: italic; font-family: inherit; }
  .meta-empty {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-faint);
    font-style: italic;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); color: var(--text);
    border-radius: 8px; padding: 20px; min-width: 360px;
    box-shadow: 0 10px 40px rgba(0,0,0,.3);
    border: 1px solid var(--border);
  }
  .modal h3 { font-size: 14px; margin-bottom: 6px; }
  .modal .hint { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; word-break: break-all; }
  .modal input {
    width: 100%; padding: 8px 10px; font-size: 13px; font-family: inherit;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px; outline: none;
  }
  .modal input:focus { border-color: #7aa8e0; box-shadow: 0 0 0 2px rgba(122,168,224,.25); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  .modal-error { color: var(--error); font-size: 12px; margin-top: 8px; min-height: 14px; }
  .modal-field { margin-top: 12px; }
  .modal-field label.field-label {
    display: block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .radio-group { display: flex; gap: 6px; }
  .radio-option {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 5px;
    background: var(--surface);
    cursor: pointer; font-size: 12px;
    user-select: none;
  }
  .radio-option:hover { background: var(--hover); }
  .radio-option input { display: none; }
  .radio-option.checked {
    border-color: #2563eb;
    background: var(--accent-bg);
    color: var(--text);
    font-weight: 600;
  }
  .hidden { display: none !important; }

  .tree-node { user-select: none; }
  .tree-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 4px;
    margin: 1px 4px;
  }
  .tree-row:hover { background: var(--surface-3); }
  .tree-row.selected { background: var(--accent-bg); }
  .tree-row.selected:hover { background: var(--accent-bg-hover); }
  .tree-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px;
    flex-shrink: 0;
  }
  .tree-toggle.empty { visibility: hidden; }
  .tree-children { display: none; }
  .tree-node.expanded > .tree-children { display: block; }
  .tree-loading, .tree-empty {
    padding: 5px 8px 5px 24px;
    color: var(--text-faint);
    font-style: italic;
  }

  .key-row {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
  }
  .key-row:hover { background: var(--hover); }
  .key-row.selected { background: var(--accent-bg); }
  .key-icon { margin-right: 10px; flex-shrink: 0; }
  .key-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }

  .col-filter-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .col-filter-bar input {
    flex: 1; padding: 3px 6px;
    font-size: 12px; font-family: "SF Mono", Menlo, Consolas, monospace;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; outline: none;
  }
  .col-filter-bar input:focus { border-color: #7aa8e0; box-shadow: 0 0 0 2px rgba(122,168,224,.25); }
  /* hide number spinners */
  .col-filter-bar input::-webkit-outer-spin-button,
  .col-filter-bar input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .col-filter-bar input[type=number] { -moz-appearance: textfield; }

  .loader, .empty-state {
    padding: 14px;
    text-align: center;
    color: var(--text-faint);
    font-style: italic;
    font-size: 12px;
  }
  .placeholder {
    padding: 20px;
    color: var(--text-faint);
    font-style: italic;
  }
  .error { color: var(--error); }

  .col-json .col-body {
    padding: 14px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .json-key     { color: var(--json-key); }
  .json-string  { color: var(--json-string); }
  .json-number  { color: var(--json-number); }
  .json-boolean { color: var(--json-boolean); }
  .json-null    { color: var(--json-null); }
  .json-punct   { color: var(--json-punct); }
  .json-toggle {
    cursor: pointer;
    user-select: none;
    display: inline-block;
    width: 12px;
    color: var(--json-toggle);
  }
  .json-collapsible { display: inline; }
  .json-collapsed > .json-body { display: none; }
  .json-collapsed > .json-ellipsis { display: inline; }
  .json-ellipsis { display: none; color: var(--json-toggle); }
  .json-indent { padding-left: 18px; }

  .col-body::-webkit-scrollbar { width: 10px; height: 10px; }
  .col-body::-webkit-scrollbar-track { background: transparent; }
  .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  .col-body::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center;
    padding: 3px 10px;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    gap: 10px;
    min-height: 24px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .status-method {
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: .3px;
  }
  .status-method.get    { color: #16a34a; background: rgba(22,163,74,.1); }
  .status-method.post   { color: #2563eb; background: rgba(37,99,235,.1); }
  .status-method.delete { color: #dc2626; background: rgba(220,38,38,.1); }
  :root[data-theme="dark"] .status-method.get    { color: #4ade80; background: rgba(74,222,128,.12); }
  :root[data-theme="dark"] .status-method.post   { color: #60a5fa; background: rgba(96,165,250,.12); }
  :root[data-theme="dark"] .status-method.delete { color: #f87171; background: rgba(248,113,113,.12); }
  .status-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-timing { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .status-timing.fast  { color: #16a34a; }
  .status-timing.med   { color: #ca8a04; }
  .status-timing.slow  { color: #dc2626; }
  :root[data-theme="dark"] .status-timing.fast { color: #4ade80; }
  :root[data-theme="dark"] .status-timing.med  { color: #facc15; }
  :root[data-theme="dark"] .status-timing.slow { color: #f87171; }
  .status-result { font-size: 10px; }
  .status-result.ok   { color: #16a34a; }
  .status-result.fail { color: #dc2626; }
  :root[data-theme="dark"] .status-result.ok   { color: #4ade80; }
  :root[data-theme="dark"] .status-result.fail { color: #f87171; }
  .status-idle { color: var(--text-faint); font-style: italic; font-family: inherit; }

  /* Loading state */
  .status-bar.loading { color: var(--text); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    flex-shrink: 0;
  }
  .status-elapsed {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 48px;
    color: var(--text-muted);
  }
  .status-bar.error {
    background: #fef2f2; border-top-color: #fca5a5;
    color: #991b1b;
  }
  .status-bar.error .status-url,
  .status-bar.error .status-timing,
  .status-bar.error .status-result { color: #b91c1c; }
  .status-bar.error .status-method { color: #fff; background: #dc2626; }
  .status-bar.error .btn-timings { color: #b91c1c; border-color: #fca5a5; }
  .status-bar.error .btn-timings:hover { background: #fee2e2; }
  :root[data-theme="dark"] .status-bar.error {
    background: #3a1616; border-top-color: #7f1d1d;
    color: #fca5a5;
  }
  :root[data-theme="dark"] .status-bar.error .status-url,
  :root[data-theme="dark"] .status-bar.error .status-timing,
  :root[data-theme="dark"] .status-bar.error .status-result { color: #f87171; }
  :root[data-theme="dark"] .status-bar.error .status-method { color: #fff; background: #991b1b; }
  :root[data-theme="dark"] .status-bar.error .btn-timings { color: #f87171; border-color: #7f1d1d; }
  :root[data-theme="dark"] .status-bar.error .btn-timings:hover { background: #4a1d1d; }

  .btn-timings {
    padding: 2px 6px; font-size: 10px; font-weight: 600;
    background: transparent; border: 1px solid var(--border);
    border-radius: 3px; color: var(--text-faint);
    cursor: pointer; font-family: inherit; letter-spacing: .3px;
    margin-left: auto; flex-shrink: 0;
  }
  .btn-timings:hover { color: var(--text-muted); border-color: var(--text-faint); background: var(--surface); }

  /* Timings dialog */
  .timings-dialog { max-width: 720px; width: 90vw; max-height: 70vh; display: flex; flex-direction: column; }
  .timings-dialog h3 { margin-bottom: 4px; }
  .timings-stats { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; font-family: "SF Mono", Menlo, Consolas, monospace; }
  .timings-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .timings-table {
    width: 100%; border-collapse: collapse;
    font-size: 11px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .timings-table th {
    text-align: left; padding: 5px 8px;
    font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-muted); font-weight: 600;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; background: var(--surface);
  }
  .timings-table td {
    padding: 4px 8px; border-bottom: 1px solid var(--border-subtle);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 280px;
  }
  .timings-table tr:hover td { background: var(--hover); }
  .timings-table .col-idx { width: 30px; color: var(--text-faint); text-align: right; }
  .timings-table .col-time { color: var(--text-faint); width: 75px; }
  .timings-table .col-method { width: 55px; }
  .timings-table .col-ms { width: 60px; text-align: right; font-variant-numeric: tabular-nums; }
  .timings-clear {
    font-size: 11px; padding: 3px 8px; cursor: pointer;
    background: transparent; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text-muted); font-family: inherit;
  }
  .timings-clear:hover { color: var(--text); border-color: var(--text-faint); }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-title">Key Browser</div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <span id="theme-icon-slot"></span>
      <span id="theme-label">Dark</span>
    </button>
  </div>
  <div class="columns">
    <div class="col col-tree">
      <div class="col-header">
        <span>Folders</span>
        <div class="header-actions">
          <button class="btn" id="btn-new-folder" disabled title="Select a folder first">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            New
          </button>
          <button class="btn btn-danger btn-icon-only" id="btn-delete-folder" disabled title="Delete folder">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
      <div class="col-filter-bar">
        <input type="text" id="jump-folder" placeholder="go to folder…" autocomplete="off" spellcheck="false">
        <button class="btn btn-icon-only" id="btn-jump-folder" title="Go to folder">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="col-body" id="tree"></div>
    </div>
    <div class="col col-keys">
      <div class="col-header">
        <span id="keys-header">Keys</span>
        <div class="header-actions">
          <button class="btn btn-icon-only" id="btn-copy-key" disabled title="Copy key">
            <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="btn btn-icon-only" id="btn-move-key" disabled title="Move key">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          </button>
          <button class="btn btn-danger btn-icon-only" id="btn-delete-key" disabled title="Delete key">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
      <div class="col-filter-bar">
        <input type="number" id="jump-offset" min="0" step="1" placeholder="jump to…" autocomplete="off">
        <button class="btn btn-icon-only" id="btn-jump" title="Go to offset">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="col-body" id="keys">
      </div>
    </div>
    <div class="col col-json">
      <div class="col-header">
        <span>Details</span>
        <div class="header-actions">
          <button class="btn btn-icon-only" id="btn-download-json" disabled title="Download JSON">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="btn btn-icon-only" id="btn-toggle-meta" title="Show metadata">
            <svg class="icon icon-chevron" id="meta-chevron" viewBox="0 0 24 24" style="transform:rotate(90deg)"><polyline points="9 6 15 12 9 18"/></svg>
          </button>
        </div>
      </div>

<script>
// ============================================================
// Theme toggle
// ============================================================
const root = document.documentElement;
const themeIconSlot = document.getElementById("theme-icon-slot");
const themeLabel = document.getElementById("theme-label");

const THEME_ICONS = {
  moon: '<svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  sun:  '<svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="7" y2="17"/><line x1="17" y1="7" x2="19.1" y2="4.9"/></svg>',
};

function applyTheme(t) {
  root.setAttribute("data-theme", t);
  themeIconSlot.innerHTML = t === "dark" ? THEME_ICONS.sun : THEME_ICONS.moon;
  themeLabel.textContent = t === "dark" ? "Light" : "Dark";
  try { localStorage.setItem("fb-theme", t); } catch (e) {}
}
const saved = (() => { try { return localStorage.getItem("fb-theme"); } catch (e) { return null; } })();
const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
applyTheme(saved || (prefersDark ? "dark" : "light"));
document.getElementById("theme-toggle").addEventListener("click", () => {
  applyTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark");
});

// ============================================================
// API configuration — paths defined once here
// ============================================================
const ENDPOINTS = {
  folders:   "/api/folders",
  keys:      "/api/keys",
  details:   "/api/details",
  moveKey:   "/api/keys/move",
  copyKey:   "/api/keys/copy",
};

const API = {
  listFolders:  (path) => `${ENDPOINTS.folders}?path=${encodeURIComponent(path)}`,
  listKeys:    (folderPath, offset, limit) =>
    `${ENDPOINTS.keys}?path=${encodeURIComponent(folderPath)}&offset=${offset}&limit=${limit}`,
  itemDetails:  (id) => `${ENDPOINTS.details}?id=${encodeURIComponent(id)}`,
  createFolder: ENDPOINTS.folders,
  deleteFolder: (path) => `${ENDPOINTS.folders}?path=${encodeURIComponent(path)}`,
  deleteKey:   (id) => `${ENDPOINTS.keys}?id=${encodeURIComponent(id)}`,
  moveKey:     ENDPOINTS.moveKey,
  copyKey:     ENDPOINTS.copyKey,
};
const PAGE_SIZE = 100;

// ============================================================
// Request log + timing
// ============================================================
const requestLog = [];

function describeUrl(url) {
  try {
    const u = new URL(url, location.origin);
    const base = Object.values(ENDPOINTS)[0].replace(/\/[^/]+$/, "");
    const p = u.pathname.startsWith(base) ? u.pathname.slice(base.length + 1) : u.pathname;
    const params = [];
    for (const [k, v] of u.searchParams) params.push(`${k}=${v}`);
    return params.length ? `${p}?${params.join("&")}` : p;
  } catch { return url; }
}

function updateStatusBar(entry) {
  const bar = document.getElementById("status-bar");
  bar.classList.remove("loading");
  bar.classList.toggle("error", !entry.ok);
  const methodCls = entry.method.toLowerCase();
  const timingCls = entry.ms < 100 ? "fast" : entry.ms < 300 ? "med" : "slow";
  const resultCls = entry.ok ? "ok" : "fail";
  bar.innerHTML = `
    <span class="status-method ${methodCls}">${entry.method}</span>
    <span class="status-url" title="${entry.url}">${entry.desc}</span>
    <span class="status-result ${resultCls}">${entry.ok ? "OK" : "ERR"}</span>
    <span class="status-timing ${timingCls}">${entry.ms}ms</span>
    <button class="btn-timings" id="btn-timings">${requestLog.length} request${requestLog.length === 1 ? "" : "s"}</button>
  `;
  bar.querySelector("#btn-timings").addEventListener("click", openTimingsDialog);
}

let _loadingTimer = null;

function showLoadingStatus(method, desc) {
  const bar = document.getElementById("status-bar");
  bar.classList.remove("error");
  bar.classList.add("loading");
  const methodCls = method.toLowerCase();
  const t0 = performance.now();
  bar.innerHTML = `
    <span class="status-spinner"></span>
    <span class="status-method ${methodCls}">${method}</span>
    <span class="status-url">${desc}</span>
    <span class="status-elapsed" id="status-elapsed">0ms</span>
    <button class="btn-timings" id="btn-timings">${requestLog.length} request${requestLog.length === 1 ? "" : "s"}</button>
  `;
  bar.querySelector("#btn-timings").addEventListener("click", openTimingsDialog);
  const el = document.getElementById("status-elapsed");
  clearInterval(_loadingTimer);
  _loadingTimer = setInterval(() => {
    if (el.isConnected) el.textContent = `${Math.round(performance.now() - t0)}ms`;
    else clearInterval(_loadingTimer);
  }, 16);
}

function stopLoadingTimer() {
  clearInterval(_loadingTimer);
  _loadingTimer = null;
}

async function fetchJSON(url, options = {}) {
  const method = (options.method || "GET").toUpperCase();
  const desc = describeUrl(url);
  const t0 = performance.now();
  let ok = true;
  showLoadingStatus(method, desc);
  try {
    const r = await fetch(url, options);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return await r.json();
  } catch (e) {
    ok = false;
    throw e;
  } finally {
    stopLoadingTimer();
    const ms = Math.round(performance.now() - t0);
    const entry = {
      id: requestLog.length + 1,
      time: new Date(),
      method,
      url,
      desc,
      ms,
      ok,
    };
    requestLog.push(entry);
    updateStatusBar(entry);
  }
}

// ============================================================
// SVG icon helpers
// ============================================================
const ICONS = {
  chevron:      '<svg class="icon icon-chevron" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>',
  folder:       '<svg class="icon icon-folder" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
  folderOpen:   '<svg class="icon icon-folder" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v1H3zM3 9h18l-2 8a2 2 0 0 1-2 1H5a2 2 0 0 1-2-2z"/></svg>',
  key:          '<svg class="icon icon-key" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><polyline points="14 3 14 8 19 8"/></svg>',
};
function iconEl(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

// ============================================================
// Folder tree
// ============================================================
const treeEl = document.getElementById("tree");
let selectedTreeRow = null;
let selectedKeyRow = null;
let selectedFolder = null;  // { path, name, node }
let selectedKey = null;    // { id, name, row, item }

async function renderTreeChildren(container, parentPath) {
  try {
    const paths = await fetchJSON(API.listFolders(parentPath));
    container.innerHTML = "";
    if (!paths.length) {
      container.innerHTML = '<div class="tree-empty">(empty)</div>';
      return;
    }
    paths.forEach(p => container.appendChild(createTreeNode(p)));
  } catch (e) {
    container.innerHTML = "";
  }
}

function createTreeNode(folderPath) {
  // folderPath is a full path string like "/one/two"
  const name = folderPath.split("/").filter(Boolean).pop() || folderPath;
  const path = folderPath;

  const node = document.createElement("div");
  node.className = "tree-node";
  node.dataset.loaded = "false";
  node.dataset.path = path;

  const row = document.createElement("div");
  row.className = "tree-row";

  // All folders are expandable — we discover emptiness on expand
  const toggle = document.createElement("span");
  toggle.className = "tree-toggle";
  toggle.appendChild(iconEl(ICONS.chevron));

  const icon = iconEl(ICONS.folder);

  const label = document.createElement("span");
  label.textContent = name;

  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(label);

  const children = document.createElement("div");
  children.className = "tree-children";
  children.style.paddingLeft = "16px";

  node.appendChild(row);
  node.appendChild(children);

  node._folder = { path, name };
  node._children = children;
  node._toggle = toggle;
  node._iconEl = icon;

  const expand = async () => {
    node.classList.add("expanded");
    const newIcon = iconEl(ICONS.folderOpen);
    node._iconEl.replaceWith(newIcon);
    node._iconEl = newIcon;
    if (node.dataset.loaded === "false") {
      node.dataset.loaded = "true";
      await renderTreeChildren(children, path);
    }
  };
  const collapse = () => {
    node.classList.remove("expanded");
    const newIcon = iconEl(ICONS.folder);
    node._iconEl.replaceWith(newIcon);
    node._iconEl = newIcon;
  };
  node._expand = expand;

  toggle.addEventListener("click", async (e) => {
    e.stopPropagation();
    if (node.classList.contains("expanded")) collapse();
    else await expand();
  });

  row.addEventListener("click", () => {
    if (selectedTreeRow) selectedTreeRow.classList.remove("selected");
    row.classList.add("selected");
    selectedTreeRow = row;
    selectedFolder = { path, name, node };
    newFolderBtn.disabled = false;
    newFolderBtn.title = `New folder in ${path || "/"}`;
    deleteFolderBtn.disabled = false;
    deleteFolderBtn.title = `Delete ${path}`;
    loadKeys(path, name);
    clearDetailsPanel();
  });

  return node;
}

// ============================================================
// Keys (infinite scroll)
// ============================================================
const keysEl = document.getElementById("keys");
const keysHeader = document.getElementById("keys-header");
const jumpOffsetInput = document.getElementById("jump-offset");
const btnJump = document.getElementById("btn-jump");
let keyState = null;

function loadKeys(path, displayName) {
  keysHeader.textContent = `Keys — ${displayName || path || "root"}`;
  keysEl.innerHTML = "";
  jumpOffsetInput.value = "";
  keyState = { path, offset: 0, loading: false, done: false };
  selectedKey = null;
  selectedKeyRow = null;
  setKeyButtonsEnabled(false);
  loadNextKeyPage();
}

function jumpToOffset() {
  if (!keyState) return;
  const val = parseInt(jumpOffsetInput.value, 10);
  if (isNaN(val) || val < 0) return;
  keysEl.innerHTML = "";
  keyState.offset = val;
  keyState.done = false;
  keyState.loading = false;
  selectedKey = null;
  selectedKeyRow = null;
  setKeyButtonsEnabled(false);
  loadNextKeyPage();
}

btnJump.addEventListener("click", jumpToOffset);
jumpOffsetInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") jumpToOffset();
});

async function loadNextKeyPage() {
  if (!keyState || keyState.loading || keyState.done) return;
  keyState.loading = true;

  try {
    const keys = await fetchJSON(API.listKeys(keyState.path, keyState.offset, PAGE_SIZE));

    if (keys.length === 0 && keyState.offset === 0) {
      keysEl.innerHTML = '<div class="empty-state">No keys</div>';
      keyState.done = true;
      keyState.loading = false;
      return;
    }

    keys.forEach(k => keysEl.appendChild(createKeyRow(k)));
    keyState.offset += keys.length;

    if (keys.length < PAGE_SIZE) {
      keyState.done = true;
      const end = document.createElement("div");
      end.className = "loader";
      end.textContent = `— end — ${keyState.offset} key${keyState.offset === 1 ? "" : "s"}`;
      keysEl.appendChild(end);
    }
  } catch (e) {
    // error shown in status bar
  } finally {
    keyState.loading = false;
  }
}

function createKeyRow(keyName) {
  const row = document.createElement("div");
  row.className = "key-row";

  const icon = iconEl(ICONS.key);
  icon.classList.add("key-icon");

  const name = document.createElement("span");
  name.className = "key-name";
  name.textContent = keyName;

  row.appendChild(icon);
  row.appendChild(name);

  row.addEventListener("click", () => {
    if (selectedKeyRow) selectedKeyRow.classList.remove("selected");
    row.classList.add("selected");
    selectedKeyRow = row;
    selectedKey = { id: keyName, name: keyName, row };
    setKeyButtonsEnabled(true);
    loadDetails(keyName);
  });

  return row;
}

keysEl.addEventListener("scroll", () => {
  if (!keyState || keyState.loading || keyState.done) return;
  const nearBottom = keysEl.scrollTop + keysEl.clientHeight >= keysEl.scrollHeight - 50;
  if (nearBottom) loadNextKeyPage();
});

// ============================================================
// JSON viewer
// ============================================================
const jsonEl = document.getElementById("json");
const metaPanel = document.getElementById("meta-panel");
const metaToggleBtn = document.getElementById("btn-toggle-meta");
const metaChevron = document.getElementById("meta-chevron");

function clearDetailsPanel() {
  jsonEl.innerHTML = "";
  metaPanel.innerHTML = "";
  currentDetailsData = null;
  const dl = document.getElementById("btn-download-json");
  if (dl) dl.disabled = true;
  const fi = document.getElementById("json-filter");
  if (fi) fi.value = "";
}

metaToggleBtn.addEventListener("click", () => {
  const open = metaPanel.classList.toggle("open");
  metaChevron.style.transform = open ? "rotate(-90deg)" : "rotate(90deg)";
  metaToggleBtn.title = open ? "Hide metadata" : "Show metadata";
});

function formatMetaValue(v) {
  if (v == null) return { text: "—", muted: true };
  if (typeof v === "string") {
    // Attempt ISO date prettification
    if (/^\d{4}-\d{2}-\d{2}T/.test(v)) {
      const d = new Date(v);
      if (!isNaN(d)) return { text: d.toLocaleString(), muted: false };
    }
    return { text: v, muted: false };
  }
  if (Array.isArray(v)) return { text: v.length ? v.join(", ") : "—", muted: !v.length };
  if (typeof v === "object") return { text: JSON.stringify(v), muted: false };
  return { text: String(v), muted: false };
}

function renderMetadata(data) {
  metaPanel.innerHTML = "";
  if (!data) { metaPanel.appendChild(emptyMeta("No metadata")); return; }

  // Flatten: pick top-level scalar-ish fields, plus properties + metadata sub-objects
  const rows = [];
  const skip = new Set(["properties", "metadata"]);
  for (const [k, v] of Object.entries(data)) {
    if (skip.has(k)) continue;
    if (v !== null && typeof v === "object") continue; // skip nested non-meta
    rows.push([k, v]);
  }
  if (data.properties && typeof data.properties === "object") {
    for (const [k, v] of Object.entries(data.properties)) rows.push([k, v]);
  }
  if (data.metadata && typeof data.metadata === "object") {
    for (const [k, v] of Object.entries(data.metadata)) {
      if (v !== null && typeof v === "object" && !Array.isArray(v)) continue; // skip deeply nested
      rows.push([k, v]);
    }
  }

  if (!rows.length) { metaPanel.appendChild(emptyMeta("No metadata")); return; }

  const grid = document.createElement("div");
  grid.className = "meta-grid";
  for (const [k, v] of rows) {
    const label = document.createElement("div");
    label.className = "meta-label";
    label.textContent = k;
    const val = document.createElement("div");
    const fmt = formatMetaValue(v);
    val.className = "meta-value" + (fmt.muted ? " muted" : "");
    val.textContent = fmt.text;
    grid.appendChild(label);
    grid.appendChild(val);
  }
  metaPanel.appendChild(grid);
}

function emptyMeta(text) {
  const d = document.createElement("div");
  d.className = "meta-empty";
  d.textContent = text;
  return d;
}

async function loadDetails(id) {
  try {
    const data = await fetchJSON(API.itemDetails(id));
    currentDetailsData = data;
    jsonFilterInput.value = "";
    btnDownloadJson.disabled = false;
    jsonEl.innerHTML = "";
    jsonEl.appendChild(renderJSON(data));
    renderMetadata(data);
  } catch (e) {
    currentDetailsData = null;
    btnDownloadJson.disabled = true;
    jsonEl.innerHTML = "";
    metaPanel.innerHTML = "";
  }
}

// ============================================================
// JSON filter
// ============================================================
let currentDetailsData = null;
const jsonFilterInput = document.getElementById("json-filter");
const btnDownloadJson = document.getElementById("btn-download-json");

function filterJSON(obj, term) {
  if (obj === null || obj === undefined) return matchesTerm(String(obj), term) ? obj : undefined;
  if (typeof obj !== "object") return matchesTerm(String(obj), term) ? obj : undefined;

  if (Array.isArray(obj)) {
    const filtered = [];
    for (const item of obj) {
      const r = filterJSON(item, term);
      if (r !== undefined) filtered.push(r);
    }
    return filtered.length ? filtered : undefined;
  }

  const result = {};
  let hasMatch = false;
  for (const [k, v] of Object.entries(obj)) {
    if (matchesTerm(k, term)) {
      result[k] = v; // key matches — include entire value
      hasMatch = true;
    } else {
      const r = filterJSON(v, term);
      if (r !== undefined) {
        result[k] = r;
        hasMatch = true;
      }
    }
  }
  return hasMatch ? result : undefined;
}

function matchesTerm(text, term) {
  return text.toLowerCase().includes(term);
}

function applyJsonFilter() {
  if (!currentDetailsData) return;
  const term = jsonFilterInput.value.trim().toLowerCase();
  jsonEl.innerHTML = "";
  if (!term) {
    jsonEl.appendChild(renderJSON(currentDetailsData));
    return;
  }
  const filtered = filterJSON(currentDetailsData, term);
  if (filtered !== undefined) {
    jsonEl.appendChild(renderJSON(filtered));
  } else {
    const msg = document.createElement("div");
    msg.className = "empty-state";
    msg.textContent = "No matches";
    jsonEl.appendChild(msg);
  }
}

jsonFilterInput.addEventListener("input", applyJsonFilter);

// ============================================================
// Download JSON
// ============================================================
btnDownloadJson.addEventListener("click", () => {
  if (!currentDetailsData) return;
  const json = JSON.stringify(currentDetailsData, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "details.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

function renderJSON(value) {
  const wrap = document.createElement("div");
  wrap.appendChild(jsonValue(value, 0));
  return wrap;
}

function jsonValue(v, depth) {
  if (v === null) return span("json-null", "null");
  if (typeof v === "boolean") return span("json-boolean", String(v));
  if (typeof v === "number") return span("json-number", String(v));
  if (typeof v === "string") return span("json-string", JSON.stringify(v));
  if (Array.isArray(v)) return jsonArray(v, depth);
  if (typeof v === "object") return jsonObject(v, depth);
  return span("", String(v));
}

function jsonObject(obj, depth) {
  const keys = Object.keys(obj);
  const container = document.createElement("span");
  container.className = "json-collapsible";

  if (keys.length === 0) {
    container.appendChild(span("json-punct", "{}"));
    return container;
  }

  const toggle = document.createElement("span");
  toggle.className = "json-toggle";
  toggle.textContent = "▼";

  const open = span("json-punct", "{");
  const ellipsis = document.createElement("span");
  ellipsis.className = "json-ellipsis";
  ellipsis.textContent = ` … ${keys.length} `;

  const body = document.createElement("span");
  body.className = "json-body";

  keys.forEach((k, i) => {
    const line = document.createElement("div");
    line.className = "json-indent";
    line.appendChild(span("json-key", JSON.stringify(k)));
    line.appendChild(span("json-punct", ": "));
    line.appendChild(jsonValue(obj[k], depth + 1));
    if (i < keys.length - 1) line.appendChild(span("json-punct", ","));
    body.appendChild(line);
  });

  const close = document.createElement("div");
  close.appendChild(span("json-punct", "}"));

  toggle.addEventListener("click", () => {
    const collapsed = container.classList.toggle("json-collapsed");
    toggle.textContent = collapsed ? "▶" : "▼";
  });

  container.appendChild(toggle);
  container.appendChild(open);
  container.appendChild(ellipsis);
  container.appendChild(body);
  container.appendChild(close);
  return container;
}

function jsonArray(arr, depth) {
  const container = document.createElement("span");
  container.className = "json-collapsible";

  if (arr.length === 0) {
    container.appendChild(span("json-punct", "[]"));
    return container;
  }

  const toggle = document.createElement("span");
  toggle.className = "json-toggle";
  toggle.textContent = "▼";

  const open = span("json-punct", "[");
  const ellipsis = document.createElement("span");
  ellipsis.className = "json-ellipsis";
  ellipsis.textContent = ` … ${arr.length} `;

  const body = document.createElement("span");
  body.className = "json-body";

  arr.forEach((v, i) => {
    const line = document.createElement("div");
    line.className = "json-indent";
    line.appendChild(jsonValue(v, depth + 1));
    if (i < arr.length - 1) line.appendChild(span("json-punct", ","));
    body.appendChild(line);
  });

  const close = document.createElement("div");
  close.appendChild(span("json-punct", "]"));

  toggle.addEventListener("click", () => {
    const collapsed = container.classList.toggle("json-collapsed");
    toggle.textContent = collapsed ? "▶" : "▼";
  });

  container.appendChild(toggle);
  container.appendChild(open);
  container.appendChild(ellipsis);
  container.appendChild(body);
  container.appendChild(close);
  return container;
}

function span(cls, text) {
  const s = document.createElement("span");
  if (cls) s.className = cls;
  s.textContent = text;
  return s;
}

// ============================================================
// Create folder
// ============================================================
const newFolderBtn = document.getElementById("btn-new-folder");
const modal = document.getElementById("modal");
const modalInput = document.getElementById("modal-input");
const modalParent = document.getElementById("modal-parent");
const modalError = document.getElementById("modal-error");
const modalCreate = document.getElementById("modal-create");
const modalCancel = document.getElementById("modal-cancel");
const modalTypeGroup = document.getElementById("modal-type-group");
const modalTargetField = document.getElementById("modal-target-field");
const modalTarget = document.getElementById("modal-target");

function getSelectedType() {
  const el = modalTypeGroup.querySelector('input[name="folder-type"]:checked');
  return el ? el.value : "normal";
}
function refreshTypeUI() {
  modalTypeGroup.querySelectorAll(".radio-option").forEach(opt => {
    opt.classList.toggle("checked", opt.querySelector("input").checked);
  });
  modalTargetField.classList.toggle("hidden", getSelectedType() !== "symlink");
}
modalTypeGroup.addEventListener("change", refreshTypeUI);

function openModal() {
  if (!selectedFolder) return;
  modalParent.textContent = `in /${selectedFolder.path}`;
  modalInput.value = "";
  modalTarget.value = "";
  modalError.textContent = "";
  // reset to "normal"
  const normalRadio = modalTypeGroup.querySelector('input[value="normal"]');
  normalRadio.checked = true;
  refreshTypeUI();
  modal.classList.add("open");
  setTimeout(() => modalInput.focus(), 0);
}
function closeModal() { modal.classList.remove("open"); }

newFolderBtn.addEventListener("click", openModal);
modalCancel.addEventListener("click", closeModal);
modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
const onModalKey = (e) => {
  if (e.key === "Enter") doCreate();
  else if (e.key === "Escape") closeModal();
};
modalInput.addEventListener("keydown", onModalKey);
modalTarget.addEventListener("keydown", onModalKey);
modalCreate.addEventListener("click", doCreate);

async function doCreate() {
  const name = modalInput.value.trim();
  const type = getSelectedType();
  const target = modalTarget.value.trim();
  modalError.textContent = "";
  if (!name) { modalError.textContent = "Name is required"; return; }
  if (/[\/\\]/.test(name)) { modalError.textContent = "Name cannot contain slashes"; return; }
  if (type === "symlink" && !target) { modalError.textContent = "Target is required for symlinks"; return; }
  if (!selectedFolder) return;

  modalCreate.disabled = true;
  modalCancel.disabled = true;
  try {
    const parentPath = selectedFolder.path;
    const payload = { parentPath, name, type };
    if (type === "symlink") payload.target = target;

    const created = await fetchJSON(API.createFolder, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    // Build the new folder's full path
    const newPath = parentPath ? `${parentPath}/${name}` : `/${name}`;

    // Update tree: expand parent, insert child
    const parentNode = selectedFolder.node;
    parentNode._toggle.classList.remove("empty");

    if (parentNode.dataset.loaded === "false") {
      parentNode.dataset.loaded = "true";
      await renderTreeChildren(parentNode._children, parentPath);
    } else {
      const empty = parentNode._children.querySelector(".tree-empty");
      if (empty) empty.remove();
      parentNode._children.appendChild(createTreeNode(newPath));
    }

    if (!parentNode.classList.contains("expanded")) {
      await parentNode._expand();
    }

    closeModal();
  } catch (e) {
    modalError.textContent = e.message || "Failed to create folder";
  } finally {
    modalCreate.disabled = false;
    modalCancel.disabled = false;
  }
}

// ============================================================
// Key + folder actions (delete / move / copy)
// ============================================================
const deleteFolderBtn = document.getElementById("btn-delete-folder");
const deleteKeyBtn   = document.getElementById("btn-delete-key");
const moveKeyBtn     = document.getElementById("btn-move-key");
const copyKeyBtn     = document.getElementById("btn-copy-key");

function setKeyButtonsEnabled(enabled) {
  [deleteKeyBtn, moveKeyBtn, copyKeyBtn].forEach(b => { b.disabled = !enabled; });
}

// --- Confirm dialog (used for deletes) ---
const confirmModal   = document.getElementById("confirm-modal");
const confirmTitle   = document.getElementById("confirm-title");
const confirmMessage = document.getElementById("confirm-message");
const confirmError   = document.getElementById("confirm-error");
const confirmOk      = document.getElementById("confirm-ok");
const confirmCancel  = document.getElementById("confirm-cancel");
let confirmHandler = null;

function openConfirm({ title, message, okLabel = "Delete", onConfirm }) {
  confirmTitle.textContent = title;
  confirmMessage.textContent = message;
  confirmOk.textContent = okLabel;
  confirmError.textContent = "";
  confirmHandler = onConfirm;
  confirmModal.classList.add("open");
}
function closeConfirm() { confirmModal.classList.remove("open"); confirmHandler = null; }
confirmCancel.addEventListener("click", closeConfirm);
confirmModal.addEventListener("click", (e) => { if (e.target === confirmModal) closeConfirm(); });
confirmOk.addEventListener("click", async () => {
  if (!confirmHandler) return;
  confirmOk.disabled = true; confirmCancel.disabled = true;
  try {
    await confirmHandler();
    closeConfirm();
  } catch (e) {
    confirmError.textContent = e.message || "Action failed";
  } finally {
    confirmOk.disabled = false; confirmCancel.disabled = false;
  }
});

// --- Transfer dialog (move / copy) ---
const transferModal  = document.getElementById("transfer-modal");
const transferTitle  = document.getElementById("transfer-title");
const transferSource = document.getElementById("transfer-source");
const transferDest   = document.getElementById("transfer-dest");
const transferError  = document.getElementById("transfer-error");
const transferOk     = document.getElementById("transfer-ok");
const transferCancel = document.getElementById("transfer-cancel");
let transferHandler = null;

function openTransfer({ title, source, okLabel, onSubmit }) {
  transferTitle.textContent = title;
  transferSource.textContent = source;
  transferOk.textContent = okLabel;
  transferDest.value = "";
  transferError.textContent = "";
  transferHandler = onSubmit;
  transferModal.classList.add("open");
  setTimeout(() => transferDest.focus(), 0);
}
function closeTransfer() { transferModal.classList.remove("open"); transferHandler = null; }
transferCancel.addEventListener("click", closeTransfer);
transferModal.addEventListener("click", (e) => { if (e.target === transferModal) closeTransfer(); });
transferDest.addEventListener("keydown", (e) => {
  if (e.key === "Enter") transferOk.click();
  else if (e.key === "Escape") closeTransfer();
});
transferOk.addEventListener("click", async () => {
  if (!transferHandler) return;
  const dest = transferDest.value.trim();
  transferError.textContent = "";
  transferOk.disabled = true; transferCancel.disabled = true;
  try {
    await transferHandler(dest);
    closeTransfer();
  } catch (e) {
    transferError.textContent = e.message || "Action failed";
  } finally {
    transferOk.disabled = false; transferCancel.disabled = false;
  }
});

// --- Delete folder ---
deleteFolderBtn.addEventListener("click", () => {
  if (!selectedFolder) return;
  const { path, node } = selectedFolder;
  openConfirm({
    title: "Delete folder",
    message: `Delete "/${path}" and everything inside it? This cannot be undone.`,
    okLabel: "Delete",
    onConfirm: async () => {
      await fetchJSON(API.deleteFolder(path), { method: "DELETE" });
      node.remove();
      selectedFolder = null;
      selectedTreeRow = null;
      deleteFolderBtn.disabled = true;
      newFolderBtn.disabled = true;
      // Clear downstream panels
      keysEl.innerHTML = '';
      keysHeader.textContent = "Keys";
      clearDetailsPanel();
      keyState = null;
      selectedKey = null;
      setKeyButtonsEnabled(false);
    }
  });
});

// --- Delete key ---
deleteKeyBtn.addEventListener("click", () => {
  if (!selectedKey) return;
  const { id, name, row } = selectedKey;
  openConfirm({
    title: "Delete key",
    message: `Delete "${name}"? This cannot be undone.`,
    okLabel: "Delete",
    onConfirm: async () => {
      await fetchJSON(API.deleteKey(id), { method: "DELETE" });
      row.remove();
      selectedKey = null;
      selectedKeyRow = null;
      setKeyButtonsEnabled(false);
      clearDetailsPanel();

});

// --- Move key ---
moveKeyBtn.addEventListener("click", () => {
  if (!selectedKey) return;
  const { id, name, row } = selectedKey;
  openTransfer({
    title: "Move key",
    source: name,
    okLabel: "Move",
    onSubmit: async (destPath) => {
      if (!destPath && destPath !== "") throw new Error("Destination is required");
      await fetchJSON(API.moveKey, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, destPath }),
      });
      // Remove from current view since it has been moved
      row.remove();
      selectedKey = null;
      selectedKeyRow = null;
      setKeyButtonsEnabled(false);
      clearDetailsPanel();
    }
  });
});

// --- Copy key ---
copyKeyBtn.addEventListener("click", () => {
  if (!selectedKey) return;
  const { id, name } = selectedKey;
  openTransfer({
    title: "Copy key",
    source: name,
    okLabel: "Copy",
    onSubmit: async (destPath) => {
      if (!destPath && destPath !== "") throw new Error("Destination is required");
      await fetchJSON(API.copyKey, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, destPath }),
      });
      // Original stays visible; nothing to remove
    }
  });
});

// ============================================================
// Timings dialog
// ============================================================
const timingsModal = document.getElementById("timings-modal");
const timingsBody  = document.getElementById("timings-body");
const timingsStats = document.getElementById("timings-stats");

function openTimingsDialog() {
  // Rebuild table rows
  timingsBody.innerHTML = "";
  for (const e of requestLog) {
    const tr = document.createElement("tr");
    const methodCls = e.method.toLowerCase();
    const timingCls = e.ms < 100 ? "fast" : e.ms < 300 ? "med" : "slow";
    tr.innerHTML = `
      <td class="col-idx">${e.id}</td>
      <td class="col-time">${e.time.toLocaleTimeString()}</td>
      <td class="col-method"><span class="status-method ${methodCls}">${e.method}</span></td>
      <td title="${e.url}">${e.desc}</td>
      <td class="col-ms"><span class="status-timing ${timingCls}">${e.ms}</span></td>
      <td><span class="status-result ${e.ok ? "ok" : "fail"}">${e.ok ? "OK" : "ERR"}</span></td>
    `;
    timingsBody.appendChild(tr);
  }
  // Summary stats
  if (requestLog.length) {
    const times = requestLog.map(e => e.ms);
    const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);
    const min = Math.min(...times);
    const max = Math.max(...times);
    const errs = requestLog.filter(e => !e.ok).length;
    timingsStats.textContent = `${requestLog.length} requests  ·  avg ${avg}ms  ·  min ${min}ms  ·  max ${max}ms${errs ? `  ·  ${errs} error${errs > 1 ? "s" : ""}` : ""}`;
  } else {
    timingsStats.textContent = "No requests recorded.";
  }
  timingsModal.classList.add("open");
}

document.getElementById("timings-close").addEventListener("click", () => timingsModal.classList.remove("open"));
timingsModal.addEventListener("click", (e) => { if (e.target === timingsModal) timingsModal.classList.remove("open"); });
document.getElementById("timings-clear").addEventListener("click", () => {
  requestLog.length = 0;
  timingsBody.innerHTML = "";
  timingsStats.textContent = "No requests recorded.";
  const bar = document.getElementById("status-bar");
  bar.classList.remove("error", "loading");
  stopLoadingTimer();
  bar.innerHTML = '<span class="status-idle">No requests yet</span><button class="btn-timings" id="btn-timings">Timings</button>';
  bar.querySelector("#btn-timings").addEventListener("click", openTimingsDialog);
});

// Initial button wiring
document.getElementById("btn-timings").addEventListener("click", openTimingsDialog);

// ============================================================
// Jump to folder
// ============================================================
const jumpFolderInput = document.getElementById("jump-folder");
const btnJumpFolder = document.getElementById("btn-jump-folder");

async function jumpToFolder() {
  let target = jumpFolderInput.value.trim();
  if (!target) return;
  // Normalise: ensure leading slash, strip trailing slash
  if (!target.startsWith("/")) target = "/" + target;
  target = target.replace(/\/+$/, "") || "/";

  // Build ancestor chain: "/a/b/c" → ["", "/a", "/a/b", "/a/b/c"]
  const segments = target.split("/").filter(Boolean);
  const chain = [""];
  let acc = "";
  for (const seg of segments) {
    acc += "/" + seg;
    chain.push(acc);
  }

  // Clear tree and reload from root, expanding each ancestor
  treeEl.innerHTML = "";
  selectedTreeRow = null;
  selectedFolder = null;
  newFolderBtn.disabled = true;
  deleteFolderBtn.disabled = true;

  let container = treeEl;
  let targetNode = null;

  for (let i = 0; i < chain.length; i++) {
    const parentPath = chain[i];
    await renderTreeChildren(container, parentPath);

    // If there's a next level, find the matching child node and expand it
    if (i < chain.length - 1) {
      const nextPath = chain[i + 1];
      const childNode = [...container.querySelectorAll(":scope > .tree-node")].find(
        n => n.dataset.path === nextPath
      );
      if (!childNode) break; // path doesn't exist on server
      if (i === chain.length - 2) targetNode = childNode;
      childNode.classList.add("expanded");
      const newIcon = iconEl(ICONS.folderOpen);
      childNode._iconEl.replaceWith(newIcon);
      childNode._iconEl = newIcon;
      childNode.dataset.loaded = "true";
      container = childNode._children;
    }
  }

  // Select the target folder
  if (targetNode) {
    const row = targetNode.querySelector(":scope > .tree-row");
    if (row) {
      if (selectedTreeRow) selectedTreeRow.classList.remove("selected");
      row.classList.add("selected");
      selectedTreeRow = row;
    }
    const name = targetNode._folder.name;
    const path = targetNode._folder.path;
    selectedFolder = { path, name, node: targetNode };
    newFolderBtn.disabled = false;
    newFolderBtn.title = `New folder in ${path}`;
    deleteFolderBtn.disabled = false;
    deleteFolderBtn.title = `Delete ${path}`;
    loadKeys(path, name);
    // Load children if not already done
    if (targetNode.dataset.loaded === "false") {
      targetNode.dataset.loaded = "true";
      targetNode.classList.add("expanded");
      const newIcon = iconEl(ICONS.folderOpen);
      targetNode._iconEl.replaceWith(newIcon);
      targetNode._iconEl = newIcon;
      await renderTreeChildren(targetNode._children, path);
    }
  }
}

btnJumpFolder.addEventListener("click", jumpToFolder);
jumpFolderInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") jumpToFolder();
});

renderTreeChildren(treeEl, "");
