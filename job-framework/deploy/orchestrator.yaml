apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: orchestrator-system
  labels:
    app.kubernetes.io/name: orchestrator
spec:
  replicas: 1  # no leader election yet; keep it at 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
    spec:
      serviceAccountName: orchestrator
      containers:
        - name: orchestrator
          image: image-registry.openshift-image-registry.svc:5000/orchestrator-system/orchestrator:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ORCHESTRATOR_NAMESPACE
              value: orchestrator-system
            - name: ORCHESTRATOR_PORT
              value: "8080"
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: "1",  memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: orchestrator-system
spec:
  selector:
    app.kubernetes.io/name: orchestrator
  ports:
    - name: http
      port: 80
      targetPort: http
