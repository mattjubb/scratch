quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept

# Swagger UI at /q/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# OpenAPI schema at /q/openapi
quarkus.smallrye-openapi.path=/openapi

mp.openapi.extensions.smallrye.info.title=Version Dashboard API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=REST backend for the Version Stage Dashboard — manages projects, their 9-stage version pipeline, and inter-project dependency pins.
