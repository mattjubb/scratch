apiVersion: v1
kind: ServiceAccount
metadata:
  name: vasara-controlplane
  namespace: vasara
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vasara-controlplane
  namespace: vasara
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vasara-controlplane
  namespace: vasara
subjects:
  - kind: ServiceAccount
    name: vasara-controlplane
    namespace: vasara
roleRef:
  kind: Role
  name: vasara-controlplane
  apiGroup: rbac.authorization.k8s.io
