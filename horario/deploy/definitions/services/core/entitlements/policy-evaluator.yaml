group: core
project: entitlements
mainClass: com.example.core.PolicyEvaluatorApp
version: dev
replicas: 1           # reduced for CRC dev (prod: 3)
resources:
  cpu: "100m"         # CRC dev sizing (prod: 500m)
  memory: 256Mi       # CRC dev sizing (prod: 1Gi)
env:
  - { name: LDAP_URL,          value: "ldap://ldap.corp.local:389" }
  - { name: LDAP_BASE_DN,      value: "dc=corp,dc=local" }
  - { name: POLICY_STORE_URL,  value: "http://policy-store.vasara.svc.cluster.local" }
  - { name: CACHE_TTL_SECONDS, value: "300" }
  - { name: SERVER_PORT,       value: "8080" }
ports:
  - { name: rest,  port: 8080 }
  - { name: grpc,  port: 9090 }
args:
  - "--spring.profiles.active=ocp"
